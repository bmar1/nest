apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nest-api-hpa
  namespace: nest
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nest-api
  minReplicas: 2
  maxReplicas: 6
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
