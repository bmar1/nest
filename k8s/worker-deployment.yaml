apiVersion: v1
kind: ConfigMap
metadata:
  name: worker-config
  namespace: nest
data:
  # Template values for the future detached worker process.
  # Keep replicas at 0 until worker-mode code exists.
  WORKER_ENABLED: "false"
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: "5672"
  RABBITMQ_VHOST: "/"
  RABBITMQ_QUEUE: scrape.jobs
  RABBITMQ_EXCHANGE: scrape.exchange
  RABBITMQ_ROUTING_KEY: scrape.job
  WORKER_CONCURRENCY: "4"
  WORKER_PREFETCH: "8"

---
apiVersion: v1
kind: Secret
metadata:
  name: worker-secret
  namespace: nest
type: Opaque
stringData:
  RABBITMQ_USERNAME: guest
  RABBITMQ_PASSWORD: guest

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nest-worker
  namespace: nest
spec:
  # Safe default: do not run until worker-only code path is implemented.
  replicas: 0
  revisionHistoryLimit: 5
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: nest-worker
  template:
    metadata:
      labels:
        app: nest-worker
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: nest-worker
        # Can reuse the same image as API initially; switch to dedicated worker image later.
        image: YOUR_DOCKERHUB_USERNAME/nest-api:latest
        imagePullPolicy: Always
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: worker
        envFrom:
        - configMapRef:
            name: api-config
        - secretRef:
            name: api-secret
        - configMapRef:
            name: worker-config
        - secretRef:
            name: worker-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "150m"
          limits:
            memory: "768Mi"
            cpu: "750m"
