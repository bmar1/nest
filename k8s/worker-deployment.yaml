apiVersion: v1
kind: ConfigMap
metadata:
  name: worker-config
  namespace: nest
data:
  SCRAPE_MODE: queue
  SPRING_RABBITMQ_HOST: rabbitmq
  SPRING_RABBITMQ_PORT: "5672"
  RABBITMQ_SCRAPE_QUEUE: scrape.jobs
  RABBITMQ_SCRAPE_EXCHANGE: scrape.exchange
  RABBITMQ_SCRAPE_ROUTING_KEY: scrape.job
  RABBITMQ_SCRAPE_DLX: scrape.dlx
  RABBITMQ_SCRAPE_DLQ: scrape.jobs.dlq
  WORKER_CONCURRENCY: "4"
  WORKER_PREFETCH: "8"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nest-worker
  namespace: nest
spec:
  # Start at 0; scale after RabbitMQ is healthy and API is in SCRAPE_MODE=queue.
  replicas: 0
  revisionHistoryLimit: 5
  minReadySeconds: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: nest-worker
  template:
    metadata:
      labels:
        app: nest-worker
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: nest-worker
        # Reuses the API image; worker behavior is selected via SPRING_PROFILES_ACTIVE=worker.
        image: northamerica-northeast1-docker.pkg.dev/nest-495223/nest/nest-api:latest
        imagePullPolicy: Always
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: worker
        envFrom:
        - configMapRef:
            name: api-config
        - secretRef:
            name: api-secret
        - configMapRef:
            name: worker-config
        - secretRef:
            name: rabbitmq-secret
        resources:
          requests:
            memory: "256Mi"
            cpu: "150m"
          limits:
            memory: "768Mi"
            cpu: "750m"
