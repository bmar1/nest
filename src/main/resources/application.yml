spring:
  application:
    name: nest

  # JDBC URL must be host:port/database only — never embed user:password in the URL.
  # Characters like # & ? in passwords are interpreted as URL syntax and break the connection string.
  # Deploy (e.g. Render) → Supabase: if you see "Network unreachable", use Dockerfile IPv4 JVM flag
  # and/or Supabase "Session pooler" host from the dashboard (port 5432). Restricted DB: allow Render egress IPs.
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:nest}${DB_JDBC_OPTIONS:}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

logging:
  level:
    com.nest.nestapp: INFO
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} - %msg%n'

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost,http://localhost:5173,http://localhost:5174}
