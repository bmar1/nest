spring:
  application:
    name: nest

  # JDBC URL must be host:port/database only — never embed user:password in the URL.
  # Characters like # & ? in passwords are interpreted as URL syntax and break the connection string.
  # Deploy (e.g. Render) → Supabase:
  # - "Network unreachable" → IPv6/route (Dockerfile sets preferIPv4Stack) or IP allowlist on Supabase.
  # - UnknownHostException for db.<ref>.supabase.co → host not in DNS: paste Host from Supabase
  #   Project Settings → Database (connection string), check project is active, no typos in DB_HOST.
  # Pooler host/port from the dashboard if you use connection pooling.
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?user=${DB_USER}&password=${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      data-source-properties:
        stringtype: unspecified

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

server:
  port: 8080
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

logging:
  level:
    com.nest.nestapp: INFO
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} - %msg%n'

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost,http://localhost:5173,http://localhost:5174}
